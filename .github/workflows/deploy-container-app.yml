name: Deploy to Azure Container Apps
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: Azure/login@v2.3.0
        with: 
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        run: |
          az acr build \
            --registry huygnguyencontainerregistry \
            --image demo-eventhub-receiver:${{ github.sha }} \
            --image demo-eventhub-receiver:latest \
            .

  deploy:
    permissions:
      contents: none
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Login to Azure
        uses: Azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          
      - name: Deploy to Azure Container Apps
        run: |
          az containerapp update \
            --name demo-eventhub-receiver \
            --resource-group EHubRG \
            --image huygnguyencontainerregistry.azurecr.io/demo-eventhub-receiver:${{ github.sha }}
